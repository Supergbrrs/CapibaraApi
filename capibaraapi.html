<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta CEP Capivara</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main>
    <div class="cards-container">

      <!-- Card de pesquisa -->
      <div class="card-wrapper">
        <div class="capibara-card">
          <div class="shimmer-layer"></div>
          <img src="Capivara 3x4.jpg" alt="Capivara" class="capivara-img">
          <div class="card-text">
            <h3>Buscar CEP</h3>
            <input type="text" id="inputCep" class="cep-input" placeholder="Digite o CEP">
            <button id="btnBuscar" class="btn">Buscar CEP</button>
          </div>
        </div>
      </div>

      <!-- Card de resultado (aparece após a busca) -->
      <div class="card-wrapper resultado-wrapper" id="resultadoWrapper" style="display:none;">
        <div class="capibara-card resultado-card">
          <div class="shimmer-layer"></div>
          <div id="resultado"></div>
        </div>
      </div>

    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
